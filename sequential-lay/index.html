<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke's Sequential Lay Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Deep, modern dark mode palette */
            --bg-main: #09090b;       
            --card-bg: #18181b;       
            --accent: #09090b;        
            --border: #27272a;        
            --border-hover: #3f3f46;  
            
            /* Typography */
            --text-main: #f4f4f5;     
            --text-muted: #a1a1aa;    
            
            /* Brand & Accents */
            --primary: #3b82f6;       
            --primary-glow: rgba(59, 130, 246, 0.5);
            --primary-hover: #2563eb; 
            
            /* Status Colors */
            --success: #10b981;       
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;        
            --danger-bg: rgba(239, 68, 68, 0.1);
            
            --override-border: rgba(245, 158, 11, 0.5);
            --override-bg: rgba(245, 158, 11, 0.05);
            --override-text: #f59e0b; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 10px; 
            -webkit-font-smoothing: antialiased;
        }

        .workspace-header {
            max-width: 1500px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(145deg, var(--card-bg), var(--bg-main));
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-top: 1px solid #3f3f46;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .workspace-header h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            color: #ffffff; 
            font-weight: 800; 
            letter-spacing: -0.03em; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .workspace-header h1::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .acca-card {
            max-width: 1500px;
            margin: 0 auto 20px auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            border-top: 1px solid #3f3f46;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .acca-header { 
            background: var(--accent); 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .acca-body { padding: 20px; }
        
        .config-bar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            background: var(--accent); 
            border: 1px solid var(--border); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
        }

        label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
            margin-bottom: 6px;
        }

        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: inherit;
            box-sizing: border-box;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-main);
            box-shadow: 0 0 0 2px var(--primary-glow), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        input::placeholder, textarea::placeholder { color: #52525b; }

        textarea {
            resize: none;
            overflow: hidden;
            min-height: 40px;
            height: 40px;
        }

        .title-input {
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            background: transparent;
            padding: 4px 8px;
            max-width: 300px;
            box-shadow: none;
            border-radius: 4px;
        }
        
        .title-input:focus {
            background: var(--bg-main);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .override-input { 
            background-color: var(--override-bg); 
            border-color: var(--override-border); 
            color: var(--override-text); 
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .override-input:focus {
            border-color: var(--override-text);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        textarea.notes-input { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            background-color: transparent;
            border: 1px dashed transparent;
            box-shadow: none;
        }
        
        textarea.notes-input:hover, textarea.notes-input:focus {
            border-color: var(--border);
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); 
            color: white; 
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .btn-primary:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px var(--primary-glow);
        }
        .btn-primary:active { transform: translateY(1px); }

        .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger-bg); }

        .btn-secondary { background: var(--bg-main); color: var(--text-muted); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--text-main); color: var(--text-main); }

        .leg-row { 
            display: grid; 
            grid-template-columns: 40px 1.5fr 0.8fr 0.8fr 1.1fr 1fr 1.6fr 60px 1fr 40px; 
            gap: 12px; 
            align-items: center; 
            background: var(--accent); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            transition: all 0.2s ease; 
        }
        
        .leg-row:hover { border-color: var(--border-hover); background: #0c0c0e; }
        .leg-row.completed { 
            filter: grayscale(1) brightness(0.6);
            opacity: 0.6;
            border-color: var(--border);
        }

        .leg-num { 
            font-weight: 800; 
            color: var(--text-muted); 
            text-align: center;
            background: var(--border);
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            margin: 0 auto;
        }

        .advised-display {
            font-weight: 800;
            color: var(--primary);
            text-align: right;
            padding-right: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .liab-display {
            color: var(--danger);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            outline: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            margin-top: 10px;
            padding: 0;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        .actual-lay-group { display: flex; flex-direction: column; gap: 4px; }
        .lay-slider { margin-top: 4px !important; }

        .done-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
            margin: 0 auto;
            display: block;
            border-radius: 4px;
        }

        .outputs-table-wrapper {
            overflow-x: auto;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--accent);
        }

        .outputs-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .outputs-table th { 
            text-align: left; 
            padding: 16px; 
            color: var(--text-muted); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border); 
            background: rgba(255,255,255,0.02); 
        }
        .outputs-table td { padding: 16px; border-bottom: 1px solid var(--border); }
        .outputs-table tr:last-child td { border-bottom: none; }
        
        .win-cell { background-color: var(--success-bg); color: var(--success); font-weight: 800; border-left: 2px solid var(--success); }
        .loss-cell { background-color: var(--danger-bg); color: var(--danger); font-weight: 800; border-left: 2px solid var(--danger); }
        
        .path-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        .path-badge.win { background-color: var(--success-bg); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }
        .path-badge.loss { background-color: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .path-arrow { color: var(--border-hover); font-size: 0.8rem; font-weight: bold; margin: 0 4px; }
        .path-container { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; }
        
        .leg-header-row {
            display: grid; 
            grid-template-columns: 40px 1.5fr 0.8fr 0.8fr 1.1fr 1fr 1.6fr 60px 1fr 40px; 
            gap: 12px; 
            padding: 0 12px 12px 12px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 1000px) {
            input, select, textarea { padding: 12px; font-size: 16px; }
            .btn { padding: 12px 20px; font-size: 1rem; }
            .workspace-header, .acca-header { flex-direction: column; align-items: stretch; gap: 15px; }
            .title-input { max-width: 100%; }
            .leg-header-row { display: none; }
            .leg-row {
                display: flex;
                flex-direction: column;
                gap: 15px;
                padding: 40px 20px 20px 20px;
                position: relative;
            }
            .leg-num { position: absolute; top: 12px; left: 15px; }
            .close-btn { position: absolute; top: 12px; right: 12px; }
            
            .advised-display { 
                text-align: left !important; 
                padding: 12px; 
                background: rgba(255,255,255,0.03); 
                border-radius: 8px; 
                border: 1px solid var(--border);
            }
            .advised-display::before { 
                content: attr(data-mobile-label);
                color: var(--text-muted); 
                font-size: 0.8rem; 
                font-family: 'Plus Jakarta Sans', sans-serif;
                text-transform: uppercase; 
                display: block;
                margin-bottom: 4px;
            }
            
            .leg-done { 
                flex-direction: row; 
                justify-content: space-between; 
                background: rgba(255,255,255,0.03); 
                padding: 12px; 
                border-radius: 8px; 
                width: 100%; 
                box-sizing: border-box; 
                border: 1px solid var(--border);
            }
            .leg-done::before { 
                content: "Mark Leg as Done:"; 
                font-weight: 800; 
                color: var(--text-main); 
                font-size: 0.85rem; 
            }
            
            .input-wrap, .actual-lay-group { width: 100%; box-sizing: border-box; }
            .input-wrap::before, .actual-lay-group::before {
                content: attr(data-label);
                display: block;
                font-size: 0.8rem;
                font-weight: 800;
                color: var(--text-muted);
                text-transform: uppercase;
                margin-bottom: 6px;
            }
            .outputs-table { min-width: 700px; }
        }
    </style>
</head>
<body>

<div class="workspace-header">
    <h1>Sequential Lay Calculator</h1>
    <button class="btn btn-primary" onclick="createNewAcca()">+ New Setup</button>
</div>

<div id="workspaceRoot"></div>

<script>
    let accaInstances = [];
    let instanceIdCounter = 0;

    function autoGrow(element) {
        element.style.height = "auto";
        element.style.height = (element.scrollHeight) + "px";
    }

    function createNewAcca() {
        const id = instanceIdCounter++;
        accaInstances.push({
            id: id,
            title: `Accumulator Session #${accaInstances.length + 1}`,
            betType: "normal",
            underlayBias: 100,
            backStake: "",
            backOdds: "",
            legs: [
                { name: "", odds: "", commission: "", actualLay: "", notes: "", completed: false },
                { name: "", odds: "", commission: "", actualLay: "", notes: "", completed: false }
            ]
        });
        renderWorkspace();
    }

    function removeInstance(id) {
        accaInstances = accaInstances.filter(item => item.id !== id);
        renderWorkspace();
    }

    function addLegToInstance(id) {
        const inst = accaInstances.find(item => item.id === id);
        if (inst && inst.legs.length < 10) {
            inst.legs.push({ name: "", odds: "", commission: "", actualLay: "", notes: "", completed: false });
            renderWorkspace();
        }
    }

    function removeLegFromInstance(id, index) {
        const inst = accaInstances.find(item => item.id === id);
        if (inst && inst.legs.length > 2) {
            inst.legs.splice(index, 1);
            renderWorkspace();
        }
    }

    function updateField(id, key, value, index = null) {
        const inst = accaInstances.find(item => item.id === id);
        if (!inst) return;
        
        if (index !== null) {
            inst.legs[index][key] = value;
            if (key === 'completed') {
                const row = document.getElementById(`leg_row_${id}_${index}`);
                if (row) row.classList.toggle('completed', value);
            }
        } else {
            inst[key] = value;
        }
        
        calculateInstance(id);
    }

    function calculateInstance(id) {
        const inst = accaInstances.find(item => item.id === id);
        if (!inst) return;

        const isSNR = (inst.betType === 'snr');
        const biasFactor = (parseFloat(inst.underlayBias) || 0) / 100;
        const bStake = parseFloat(inst.backStake) || 0;
        const bOdds = parseFloat(inst.backOdds) || 0;
        
        const backReturn = isSNR ? (bStake * (bOdds - 1)) : (bStake * bOdds);
        const backCost = isSNR ? 0 : bStake;
        const numLegs = inst.legs.length;

        // Calculate Standard Lays
        let standardLays = [];
        let runLiabilityStd = 0;
        for (let i = 0; i < numLegs; i++) {
            const lOdds = parseFloat(inst.legs[i].odds) || 0;
            const lComm = (parseFloat(inst.legs[i].commission) || 0) / 100;
            let stdLay = (lOdds > lComm && lOdds > 1) ? (backCost + runLiabilityStd) / (1 - lComm) : 0;
            standardLays.push(stdLay);
            runLiabilityStd += stdLay * (Math.max(1, lOdds) - 1);
        }

        // Calculate Lock-In Lays
        let lockInLays = new Array(numLegs).fill(0);
        let currentTarget = backReturn;
        for (let i = numLegs - 1; i >= 0; i--) {
            const lOdds = parseFloat(inst.legs[i].odds) || 0;
            const lComm = (parseFloat(inst.legs[i].commission) || 0) / 100;
            lockInLays[i] = (lOdds > lComm) ? (currentTarget / (lOdds - lComm)) : 0;
            currentTarget = lockInLays[i] * (1 - lComm);
        }

        let cumulativeLiabilityIfWon = 0;
        let legsData = [];

        inst.legs.forEach((leg, i) => {
            const advised = standardLays[i] + (biasFactor * (lockInLays[i] - standardLays[i]));
            const usedVal = parseFloat(leg.actualLay);
            const actualUsed = isNaN(usedVal) ? advised : usedVal;
            
            const lOdds = parseFloat(leg.odds) || 0;
            const liability = actualUsed * (Math.max(1, lOdds) - 1);
            cumulativeLiabilityIfWon += liability;
            
            legsData.push({ advised, actualUsed, liability });
            
            const advisedDisplay = document.getElementById(`advised_${id}_${i}`);
            const liabDisplay = document.getElementById(`liab_${id}_${i}`);
            const inputEl = document.getElementById(`override_${id}_${i}`);
            const sliderEl = document.getElementById(`slider_${id}_${i}`);
            
            if (advisedDisplay) advisedDisplay.innerText = `£${advised.toFixed(2)}`;
            if (liabDisplay) liabDisplay.innerText = `£${liability.toFixed(2)}`;
            
            if (inputEl && document.activeElement !== inputEl) {
                inputEl.value = actualUsed.toFixed(2);
            }
            if (sliderEl) {
                const calculatedMax = Math.max(advised * 2, 0.01);
                sliderEl.max = calculatedMax.toFixed(2);
                if (document.activeElement !== sliderEl) {
                    sliderEl.value = actualUsed.toFixed(2);
                }
            }
        });

        const resultsTable = document.getElementById(`results_${id}`);
        if (!resultsTable) return;

        let html = '';
        legsData.forEach((ld, i) => {
            const leg = inst.legs[i];
            const lComm = (parseFloat(leg.commission) || 0) / 100;
            
            // Cash flow calculations
            const netLayPayout = ld.actualUsed * (1 - lComm);
            const priorLiabilities = legsData.slice(0, i).reduce((sum, item) => sum + item.liability, 0);
            const backPL = -backCost; // 0 if SNR
            const displayBackPL = Math.abs(backPL) < 0.01 ? 0 : backPL;
            
            const netProfitIfLegLoses = netLayPayout + backPL - priorLiabilities;
            const displayNet = Math.abs(netProfitIfLegLoses) < 0.01 ? 0 : netProfitIfLegLoses;
            
            let pathHtml = '<div class="path-container">';
            for(let p = 0; p < i; p++) {
                pathHtml += `<span class="path-badge win">W</span><span class="path-arrow">→</span>`;
            }
            pathHtml += `<span class="path-badge loss">L</span></div>`;

            html += `<tr>
                <td>${pathHtml}</td>
                <td><strong>${leg.name || `Leg ${i+1}`} Fails</strong></td>
                <td style="color:${backPL < 0 ? 'var(--danger)' : 'var(--text-muted)'}">${backPL < 0 ? '-£' : '£'}${Math.abs(displayBackPL).toFixed(2)}</td>
                <td style="color:var(--success)">+£${netLayPayout.toFixed(2)}</td>
                <td style="color:${priorLiabilities > 0 ? 'var(--danger)' : 'var(--text-muted)'}">${priorLiabilities > 0 ? '-£' : '£'}${priorLiabilities.toFixed(2)}</td>
                <td class="${displayNet >= 0 ? 'win-cell' : 'loss-cell'} mono-text">£${displayNet.toFixed(2)}</td>
            </tr>`;
        });

        let allWinPathHtml = '<div class="path-container">';
        for(let p = 0; p < numLegs; p++) {
            allWinPathHtml += `<span class="path-badge win">W</span>`;
            if (p < numLegs - 1) allWinPathHtml += `<span class="path-arrow">→</span>`;
        }
        allWinPathHtml += '</div>';

        const backWinPL = backReturn - backCost;
        const displayBackWinPL = Math.abs(backWinPL) < 0.01 ? 0 : backWinPL;
        const finalNet = backWinPL - cumulativeLiabilityIfWon;
        const displayFinalNet = Math.abs(finalNet) < 0.01 ? 0 : finalNet;
        
        html += `<tr style="background: rgba(255,255,255,0.02); border-top:1px solid var(--border-hover);">
            <td>${allWinPathHtml}</td>
            <td><strong>All Legs Win</strong></td>
            <td style="color:var(--success)">+£${displayBackWinPL.toFixed(2)}</td>
            <td style="color:var(--text-muted)">-</td>
            <td style="color:var(--danger)">-£${cumulativeLiabilityIfWon.toFixed(2)}</td>
            <td class="${displayFinalNet >= 0 ? 'win-cell' : 'loss-cell'} mono-text">£${displayFinalNet.toFixed(2)}</td>
        </tr>`;
        resultsTable.innerHTML = html;
    }

    function renderWorkspace() {
        const root = document.getElementById('workspaceRoot');
        root.innerHTML = '';
        
        accaInstances.forEach(inst => {
            const card = document.createElement('div');
            card.className = 'acca-card';
            
            let legsHtml = '';
            inst.legs.forEach((leg, index) => {
                legsHtml += `
                    <div class="leg-row ${leg.completed ? 'completed' : ''}" id="leg_row_${inst.id}_${index}">
                        <div class="leg-num">#${index + 1}</div>
                        <div class="input-wrap" data-label="Event / Selection">
                            <textarea rows="1" placeholder="Event" oninput="updateField(${inst.id}, 'name', this.value, ${index}); autoGrow(this)">${leg.name}</textarea>
                        </div>
                        <div class="input-wrap" data-label="Lay Odds">
                            <input type="number" value="${leg.odds}" step="0.05" placeholder="Odds" oninput="updateField(${inst.id}, 'odds', this.value, ${index})">
                        </div>
                        <div class="input-wrap" data-label="Comm %">
                            <input type="number" value="${leg.commission}" step="0.5" placeholder="0" oninput="updateField(${inst.id}, 'commission', this.value, ${index})">
                        </div>
                        <div class="input-wrap" data-label="Advised Lay">
                            <div class="advised-display" data-mobile-label="Advised Lay:" id="advised_${inst.id}_${index}">£0.00</div>
                        </div>
                        <div class="input-wrap" data-label="Liability">
                            <div class="advised-display liab-display" data-mobile-label="Liability:" id="liab_${inst.id}_${index}">£0.00</div>
                        </div>
                        <div class="actual-lay-group" data-label="Actual Lay Stake">
                            <input type="number" id="override_${inst.id}_${index}" class="override-input" value="${leg.actualLay || ''}" placeholder="£0.00" step="0.01" oninput="updateField(${inst.id}, 'actualLay', this.value, ${index})">
                            <input type="range" id="slider_${inst.id}_${index}" class="lay-slider" min="0" max="100" step="0.01" value="${leg.actualLay || 0}" oninput="updateField(${inst.id}, 'actualLay', this.value, ${index}); document.getElementById('override_${inst.id}_${index}').value = this.value">
                        </div>
                        <div class="leg-done">
                            <input type="checkbox" class="done-checkbox" title="Mark as complete" ${leg.completed ? 'checked' : ''} onchange="updateField(${inst.id}, 'completed', this.checked, ${index})">
                        </div>
                        <div class="input-wrap" data-label="Notes">
                            <textarea rows="1" class="notes-input" placeholder="Notes" oninput="updateField(${inst.id}, 'notes', this.value, ${index}); autoGrow(this)">${leg.notes}</textarea>
                        </div>
                        <button class="btn-secondary close-btn" style="border-radius:8px; width:32px; height:32px; padding:0; border:none; cursor:pointer;" onclick="removeLegFromInstance(${inst.id}, ${index})" ${inst.legs.length <= 2 ? 'disabled style="opacity:0.2;"' : ''}>✕</button>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="acca-header">
                    <input type="text" class="title-input" value="${inst.title}" oninput="updateField(${inst.id}, 'title', this.value)">
                    <button class="btn btn-danger" onclick="removeInstance(${inst.id})">Delete Session</button>
                </div>
                <div class="acca-body">
                    <div class="config-bar">
                        <div>
                            <label>Bet Style</label>
                            <select onchange="updateField(${inst.id}, 'betType', this.value); calculateInstance(${inst.id});">
                                <option value="normal" ${inst.betType === 'normal' ? 'selected' : ''}>Normal Qualifying</option>
                                <option value="snr" ${inst.betType === 'snr' ? 'selected' : ''}>Free Bet (SNR)</option>
                            </select>
                        </div>
                        <div style="grid-column: span 2;">
                            <label style="color:var(--primary);">Underlay Strategy: <span id="biasLabel_${inst.id}">${inst.underlayBias}</span>%</label>
                            <input type="range" min="0" max="100" value="${inst.underlayBias}" style="cursor: pointer;" oninput="document.getElementById('biasLabel_${inst.id}').innerText=this.value; updateField(${inst.id}, 'underlayBias', this.value)">
                            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-top: 6px;">
                                <span>0% (Standard)</span>
                                <span>100% (Lock-In)</span>
                            </div>
                        </div>
                        <div>
                            <label>Back Stake (£)</label>
                            <input type="number" step="0.5" placeholder="0.00" value="${inst.backStake}" oninput="updateField(${inst.id}, 'backStake', this.value)">
                        </div>
                        <div>
                            <label>Total Back Odds</label>
                            <input type="number" value="${inst.backOdds}" placeholder="0.00" step="0.5" oninput="updateField(${inst.id}, 'backOdds', this.value)">
                        </div>
                    </div>
                    
                    <div style="display:flex; align-items:center; margin-bottom:12px; margin-top:25px;">
                        <h4 style="margin:0; color:var(--text-main); font-size: 1.1rem; font-weight: 800; display:flex; align-items:center; gap:8px;">
                            <span style="display:inline-block; width:8px; height:8px; background:var(--primary); border-radius:50%; box-shadow:0 0 8px var(--primary-glow);"></span>
                            Sequential Legs Setup
                        </h4>
                        <button class="btn btn-secondary" style="margin-left:auto; border-color:var(--primary); color:var(--primary);" onclick="addLegToInstance(${inst.id})" ${inst.legs.length >= 10 ? 'disabled' : ''}>+ Add Next Leg</button>
                    </div>
                    
                    <div class="legs-container">
                        <div class="leg-header-row">
                            <div>#</div>
                            <div>Event / Selection</div>
                            <div>Lay Odds</div>
                            <div>Comm %</div>
                            <div style="text-align: right; padding-right: 10px;">Advised</div>
                            <div style="text-align: right; padding-right: 10px;">Liability</div>
                            <div>Actual Lay Stake</div>
                            <div style="text-align: center;">Done</div>
                            <div>Notes</div>
                            <div></div>
                        </div>
                        ${legsHtml}
                    </div>
                    
                    <div class="outputs-section" style="margin-top: 30px;">
                        <h4 style="margin:0; color:var(--text-main); font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display:flex; align-items:center; gap:8px;">
                            <span style="display:inline-block; width:8px; height:8px; background:var(--primary); border-radius:50%; box-shadow:0 0 8px var(--primary-glow);"></span>
                            Bet Settlement Calculations
                        </h4>
                        <div class="outputs-table-wrapper">
                            <table class="outputs-table">
                                <thead>
                                    <tr>
                                        <th>Event Path</th>
                                        <th>Scenario Outcome</th>
                                        <th>Back Bet P/L</th>
                                        <th>Lay Win (Net)</th>
                                        <th>Liabilities Paid</th>
                                        <th>Net P&L Result</th>
                                    </tr>
                                </thead>
                                <tbody id="results_${inst.id}"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            root.appendChild(card);
            
            card.querySelectorAll('textarea').forEach(el => {
                autoGrow(el);
            });
            
            calculateInstance(inst.id);
        });
    }

    createNewAcca();
</script>
</body>
</html>
