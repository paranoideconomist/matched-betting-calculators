<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luke's Multi-Lay Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Deep, modern dark mode palette */
            --bg-main: #09090b;       /* Zinc 950 */
            --card-bg: #18181b;       /* Zinc 900 */
            --accent: #09090b;        /* Zinc 950 for inset areas */
            --border: #27272a;        /* Zinc 800 */
            --border-hover: #3f3f46;  /* Zinc 700 */
            
            /* Typography */
            --text-main: #f4f4f5;     /* Zinc 50 */
            --text-muted: #a1a1aa;    /* Zinc 400 */
            
            /* Brand & Accents */
            --primary: #3b82f6;       /* Blue 500 */
            --primary-glow: rgba(59, 130, 246, 0.5);
            --primary-hover: #2563eb; /* Blue 600 */
            
            /* Status Colors */
            --success: #10b981;       /* Emerald 500 */
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;        /* Red 500 */
            --danger-bg: rgba(239, 68, 68, 0.1);
            
            --warning-border: #b45309;
            --warning-bg: rgba(180, 83, 9, 0.1);
            --warning-text: #f59e0b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px 10px; 
            -webkit-font-smoothing: antialiased;
        }

        /* Neon/Gradient Header */
        .workspace-header {
            max-width: 1400px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(145deg, var(--card-bg), var(--bg-main));
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-top: 1px solid #3f3f46;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .workspace-header h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            color: #ffffff; 
            font-weight: 800; 
            letter-spacing: -0.03em; 
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .workspace-header h1::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Cards */
        .acca-card {
            max-width: 1400px;
            margin: 0 auto 20px auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
            border-top: 1px solid #3f3f46; /* Subtle top highlight */
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .acca-header { 
            background: var(--accent); 
            padding: 12px 20px; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .acca-body { padding: 20px; }
        
        /* Layout Blocks */
        .config-bar { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            background: var(--accent); 
            border: 1px solid var(--border); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
        }

        label {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
            margin-bottom: 6px;
        }

        /* Modern Inputs */
        input, select, textarea {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: inherit;
            box-sizing: border-box;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-main);
            box-shadow: 0 0 0 2px var(--primary-glow), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Number input arrows disabled for cleaner look */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        
        input::placeholder, textarea::placeholder {
            color: #52525b;
        }

        textarea {
            resize: none;
            overflow: hidden;
            min-height: 40px;
            height: 40px;
        }

        .title-input {
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            background: transparent;
            padding: 4px 8px;
            max-width: 300px;
            box-shadow: none;
            border-radius: 4px;
        }
        
        .title-input:focus {
            background: var(--bg-main);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); 
            color: white; 
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .btn-primary:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px var(--primary-glow);
        }
        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-danger { 
            background: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger);
        }
        .btn-danger:hover { 
            background: var(--danger-bg); 
        }

        .btn-secondary { 
            background: var(--bg-main); 
            color: var(--text-muted); 
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        /* Leg Rows */
        .leg-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 2fr 1.2fr 1.2fr 40px; 
            gap: 12px; 
            align-items: center; 
            background: var(--accent); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            transition: all 0.2s ease; 
        }
        
        .leg-row:hover {
            border-color: var(--border-hover);
            background: #0c0c0e;
        }

        .calculated-display {
            font-weight: 800;
            color: var(--primary);
            text-align: right;
            padding-right: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            text-shadow: 0 0 10px var(--primary-glow);
        }
        
        .liab-display {
            color: var(--danger);
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        /* Custom Modern Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 99px;
            outline: none;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
            margin-top: 10px;
            padding: 0;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Output Tables */
        .outputs-table-wrapper {
            overflow-x: auto;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--accent);
        }

        .outputs-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.9rem; 
        }

        .outputs-table th { 
            text-align: left; 
            padding: 16px; 
            color: var(--text-muted); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            border-bottom: 1px solid var(--border); 
            background: rgba(255,255,255,0.02); 
        }

        .outputs-table td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border); 
        }
        
        .outputs-table tr:last-child td {
            border-bottom: none;
        }
        
        .win-cell { background-color: var(--success-bg); color: var(--success); font-weight: 800; border-left: 2px solid var(--success); }
        .loss-cell { background-color: var(--danger-bg); color: var(--danger); font-weight: 800; border-left: 2px solid var(--danger); }
        .mono-text { font-family: 'JetBrains Mono', monospace; font-size: 1rem; }
        
        .leg-header-row {
            display: grid; 
            grid-template-columns: 2fr 1fr 2fr 1.2fr 1.2fr 40px;  
            gap: 12px; 
            padding: 0 12px 12px 12px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .controls-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--accent);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 12px;
            gap: 20px;
        }

        .max-liability-banner {
            background: var(--warning-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--warning-border);
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--warning-text);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .max-liability-banner strong {
            font-size: 1.1rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.02em;
        }

        /* Mobile specific fixes */
        @media (max-width: 850px) {
            input, select, textarea { padding: 12px; font-size: 16px; }
            .btn { padding: 12px 20px; font-size: 1rem; }
            .workspace-header, .acca-header { flex-direction: column; align-items: stretch; gap: 15px; }
            .controls-footer { flex-direction: column; align-items: stretch; }
            .title-input { max-width: 100%; }
            .leg-header-row { display: none; }
            .leg-row {
                display: flex;
                flex-direction: column;
                gap: 15px;
                padding: 40px 20px 20px 20px;
                position: relative;
            }
            .close-btn { position: absolute; top: 12px; right: 12px; }
            .calculated-display { 
                text-align: left !important; 
                padding: 12px; 
                background: rgba(255,255,255,0.03); 
                border-radius: 8px; 
                border: 1px solid var(--border);
            }
            .calculated-display::before { 
                content: attr(data-mobile-label); 
                color: var(--text-muted); 
                font-size: 0.8rem; 
                font-family: 'Plus Jakarta Sans', sans-serif;
                text-transform: uppercase; 
                display: block;
                margin-bottom: 4px;
            }
            .input-wrap { width: 100%; box-sizing: border-box; }
            .input-wrap::before {
                content: attr(data-label);
                display: block;
                font-size: 0.8rem;
                font-weight: 800;
                color: var(--text-muted);
                text-transform: uppercase;
                margin-bottom: 6px;
            }
            .outputs-table { min-width: 700px; }
        }
    </style>
</head>
<body>

<div class="workspace-header">
    <h1>Multi Lay Calculator</h1>
    <button class="btn btn-primary" onclick="createNewInstance()">+ New Setup</button>
</div>

<div id="workspaceRoot"></div>

<script>
    let mlInstances = [];
    let instanceIdCounter = 0;

    function autoGrow(element) {
        element.style.height = "auto";
        element.style.height = (element.scrollHeight) + "px";
    }

    function createNewInstance() {
        const id = instanceIdCounter++;
        mlInstances.push({
            id: id,
            title: `Multi-Lay Setup #${mlInstances.length + 1}`,
            betType: "normal",
            backStake: "",
            backOdds: "",
            commission: "",
            globalMultiplier: 100,
            legs: [
                { name: "", odds: "", bias: 100 },
                { name: "", odds: "", bias: 100 }
            ]
        });
        renderWorkspace();
    }

    function removeInstance(id) {
        mlInstances = mlInstances.filter(item => item.id !== id);
        renderWorkspace();
    }

    function addLegToInstance(id) {
        const inst = mlInstances.find(item => item.id === id);
        if (inst && inst.legs.length < 6) { 
            inst.legs.push({ name: "", odds: "", bias: 100 });
            renderWorkspace();
        }
    }

    function removeLegFromInstance(id, index) {
        const inst = mlInstances.find(item => item.id === id);
        if (inst && inst.legs.length > 2) {
            inst.legs.splice(index, 1);
            renderWorkspace();
        }
    }

    function updateField(id, key, value, index = null) {
        const inst = mlInstances.find(item => item.id === id);
        if (!inst) return;
        
        if (index !== null) {
            inst.legs[index][key] = value;
            if (key === 'bias') {
                const label = document.getElementById(`bias_label_${id}_${index}`);
                if (label) label.innerText = value;
            }
        } else {
            inst[key] = value;
            if (key === 'globalMultiplier') {
                const label = document.getElementById(`global_label_${id}`);
                if (label) label.innerText = value;
            }
        }
        
        calculateInstance(id);
    }

    function calculateInstance(id) {
        const inst = mlInstances.find(item => item.id === id);
        if (!inst) return;

        const isSNR = (inst.betType === 'snr');
        const bStake = parseFloat(inst.backStake) || 0;
        const bOdds = parseFloat(inst.backOdds) || 0;
        const comm = (parseFloat(inst.commission) || 0) / 100;
        const globalMult = (parseFloat(inst.globalMultiplier) || 0) / 100;
        
        const totalReturn = isSNR ? (bStake * (bOdds - 1)) : (bStake * bOdds);
        const netBackCost = isSNR ? 0 : bStake;
        const backWinsPnl = totalReturn - netBackCost; 

        let legsData = [];
        let cumulativeLayWins = 0;
        let maxLiability = 0;

        // Pass 1: Calculate raw stakes and liabilities
        inst.legs.forEach((leg, i) => {
            const lOdds = parseFloat(leg.odds) || 0;
            const lBias = (parseFloat(leg.bias) || 0) / 100;
            
            let layStake = 0;
            if (lOdds > 1 && totalReturn > 0) {
                layStake = (totalReturn / (lOdds - comm)) * lBias * globalMult;
            }
            
            // Use Math.max to prevent negative liability on empty/weird odds
            const liability = layStake * (Math.max(1, lOdds) - 1); 
            const netLayWin = layStake * (1 - comm);
            
            cumulativeLayWins += netLayWin;
            if (liability > maxLiability) maxLiability = liability;

            legsData.push({ layStake, liability, netLayWin });

            // Update UI elements directly for speed
            const advisedDisplay = document.getElementById(`advised_${id}_${i}`);
            if (advisedDisplay) advisedDisplay.innerText = `£${layStake.toFixed(2)}`;
            
            const liabDisplay = document.getElementById(`liab_${id}_${i}`);
            if (liabDisplay) liabDisplay.innerText = `£${liability.toFixed(2)}`;
        });

        const resultsTable = document.getElementById(`results_${id}`);
        const maxLiabDisplay = document.getElementById(`max_liab_${id}`);
        if (!resultsTable) return;

        let html = '';

        // Scenario 1: Back bet loses (Alternative outcome happens)
        const backLosesNet = cumulativeLayWins - netBackCost;
        
        html += `<tr>
            <td><strong>Back Bet Loses / Alt. Outcome</strong></td>
            <td style="color:${netBackCost > 0 ? 'var(--danger)' : 'var(--text-main)'}">£${(-netBackCost).toFixed(2)}</td>
            <td style="color:var(--success)">+£${cumulativeLayWins.toFixed(2)}</td>
            <td style="color:var(--text-muted)">-</td>
            <td class="${backLosesNet >= 0 ? 'win-cell' : 'loss-cell'} mono-text">£${backLosesNet.toFixed(2)}</td>
        </tr>`;

        // Scenarios 2+: Back bet wins because specific leg hit
        legsData.forEach((ld, i) => {
            const leg = inst.legs[i];
            const otherLaysWin = cumulativeLayWins - ld.netLayWin;
            const netTotal = backWinsPnl + otherLaysWin - ld.liability;

            html += `<tr>
                <td>If <strong>${leg.name || `Leg ${i+1}`}</strong> Hits</td>
                <td style="color:var(--success)">+£${backWinsPnl.toFixed(2)}</td>
                <td style="color:var(--success)">+£${otherLaysWin.toFixed(2)}</td>
                <td style="color:var(--danger)">-£${ld.liability.toFixed(2)}</td>
                <td class="${netTotal >= 0 ? 'win-cell' : 'loss-cell'} mono-text">£${netTotal.toFixed(2)}</td>
            </tr>`;
        });

        resultsTable.innerHTML = html;
        if(maxLiabDisplay) maxLiabDisplay.innerText = maxLiability.toFixed(2);
    }

    function renderWorkspace() {
        const root = document.getElementById('workspaceRoot');
        root.innerHTML = '';
        
        mlInstances.forEach(inst => {
            const card = document.createElement('div');
            card.className = 'acca-card';
            
            let legsHtml = '';
            inst.legs.forEach((leg, index) => {
                legsHtml += `
                    <div class="leg-row">
                        <div class="input-wrap" data-label="Event / Selection">
                            <textarea rows="1" placeholder="Score/Outcome" oninput="updateField(${inst.id}, 'name', this.value, ${index}); autoGrow(this)">${leg.name}</textarea>
                        </div>
                        <div class="input-wrap" data-label="Lay Odds">
                            <input type="number" value="${leg.odds}" step="0.05" placeholder="Odds" oninput="updateField(${inst.id}, 'odds', this.value, ${index})">
                        </div>
                        <div class="input-wrap" data-label="Weight / Bias">
                            <label style="margin-bottom:0; color:var(--primary);">Bias: <span id="bias_label_${inst.id}_${index}">${leg.bias}</span>%</label>
                            <input type="range" class="lay-slider" min="0" max="150" step="1" value="${leg.bias}" oninput="updateField(${inst.id}, 'bias', this.value, ${index})">
                        </div>
                        <div class="input-wrap" data-label="Calculated Lay">
                            <div class="calculated-display" data-mobile-label="Calculated Lay" id="advised_${inst.id}_${index}">£0.00</div>
                        </div>
                        <div class="input-wrap" data-label="Liability">
                            <div class="calculated-display liab-display" data-mobile-label="Liability" id="liab_${inst.id}_${index}">£0.00</div>
                        </div>
                        <button class="btn-secondary close-btn" style="border-radius:8px; width:32px; height:32px; padding:0; cursor:pointer;" onclick="removeLegFromInstance(${inst.id}, ${index})" ${inst.legs.length <= 2 ? 'disabled style="opacity:0.2;"' : ''}>✕</button>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="acca-header">
                    <input type="text" class="title-input" value="${inst.title}" oninput="updateField(${inst.id}, 'title', this.value)">
                    <button class="btn btn-danger" onclick="removeInstance(${inst.id})">Delete Session</button>
                </div>
                <div class="acca-body">
                    <div class="config-bar">
                        <div>
                            <label>Bet Style Profile</label>
                            <select onchange="updateField(${inst.id}, 'betType', this.value);">
                                <option value="normal" ${inst.betType === 'normal' ? 'selected' : ''}>Normal Qualifying</option>
                                <option value="snr" ${inst.betType === 'snr' ? 'selected' : ''}>Free Bet (SNR)</option>
                            </select>
                        </div>
                        <div>
                            <label>Back Stake (£)</label>
                            <input type="number" step="0.5" placeholder="0.00" value="${inst.backStake}" oninput="updateField(${inst.id}, 'backStake', this.value)">
                        </div>
                        <div>
                            <label>Total Back Odds</label>
                            <input type="number" value="${inst.backOdds}" placeholder="0.00" step="0.5" oninput="updateField(${inst.id}, 'backOdds', this.value)">
                        </div>
                        <div>
                            <label>Global Exchange Comm (%)</label>
                            <input type="number" value="${inst.commission}" placeholder="0" step="0.1" oninput="updateField(${inst.id}, 'commission', this.value)">
                        </div>
                    </div>
                    
                    <div class="legs-container">
                        <div class="leg-header-row">
                            <div>Outcome Selection</div>
                            <div>Lay Odds</div>
                            <div>Target Weight / Bias</div>
                            <div style="text-align: right; padding-right: 10px;">Calculated Lay</div>
                            <div style="text-align: right; padding-right: 10px;">Liability</div>
                            <div></div>
                        </div>
                        ${legsHtml}
                    </div>

                    <div class="controls-footer">
                        <div style="flex:1; max-width: 400px;">
                            <label style="color:var(--primary); font-size:0.8rem;">Global Scaling Multiplier: <span id="global_label_${inst.id}">${inst.globalMultiplier}</span>%</label>
                            <input type="range" class="lay-slider" min="0" max="150" step="1" value="${inst.globalMultiplier}" oninput="updateField(${inst.id}, 'globalMultiplier', this.value)">
                        </div>
                        <button class="btn btn-secondary" style="border-color: var(--primary); color: var(--primary);" onclick="addLegToInstance(${inst.id})" ${inst.legs.length >= 6 ? 'disabled' : ''}>+ Add Leg</button>
                    </div>
                    
                    <div class="outputs-section" style="margin-top: 30px;">
                        <h4 style="margin:0; color:var(--text-main); font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display:flex; align-items:center; gap:8px;">
                            <span style="display:inline-block; width:8px; height:8px; background:var(--primary); border-radius:50%; box-shadow:0 0 8px var(--primary-glow);"></span>
                            Bet Settlement Calculations
                        </h4>
                        <div class="outputs-table-wrapper">
                            <table class="outputs-table">
                                <thead>
                                    <tr>
                                        <th>Scenario Condition</th>
                                        <th>Back Bet P/L</th>
                                        <th>Winning Lays P/L</th>
                                        <th>Liability Paid</th>
                                        <th>Net P&L Result</th>
                                    </tr>
                                </thead>
                                <tbody id="results_${inst.id}"></tbody>
                            </table>
                        </div>
                        <div class="max-liability-banner">
                            <strong>Max Exchange Exposure: £<span id="max_liab_${inst.id}">0.00</span></strong>
                            <span>Since these scorelines are mutually exclusive, your exchange only needs to hold liability for the largest single threat.</span>
                        </div>
                    </div>
                </div>
            `;
            root.appendChild(card);
            
            card.querySelectorAll('textarea').forEach(el => {
                autoGrow(el);
            });
            
            calculateInstance(inst.id);
        });
    }

    createNewInstance();
</script>
</body>
</html>
